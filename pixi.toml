[workspace]
name = "peakloc"
version = "0.1.0"
description = "Minimal PeakLoc environment for Metavision OpenEB RAW reader smoke tests"
channels = ["conda-forge"]
platforms = ["linux-64"]

[activation.env]
PYTHONPATH = "/usr/lib/python3/dist-packages"

[dependencies]
python = "3.12.*"
numpy = "*"
h5py = ">=3.16.0,<4"

[tasks]
import-test = "python import_test.py"
