[workspace]
name = "peakloc"
version = "0.1.0"
description = "Event-camera SMLM localization pipeline"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.12.*"
awkward = "*"
cryptography = "*"
csaps = "*"
h5py = "*"
interpolation = "*"
joblib = "*"
matplotlib = "*"
matplotlib-scalebar = "*"
natsort = "*"
numba = "*"
numpy = "*"
scikit-image = "*"
scipy = "*"
tifffile = "*"
loguru = ">=0.7.3,<0.8"

[feature.dev.dependencies]
pytest = "*"
ruff = "*"
ty = "*"

[feature.dev.tasks]
test = "pytest"
lint = "ruff check --fix ."
format = "ruff format ."
typecheck = "ty check"

[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }

[tasks]
clean-temp = "python -m scripts.clean_temp_files"
import-test = "python -m scripts.import_test"
peakloc = "python PeakLoc.py"
peaks-dict-to-locs = "python -m scripts.peaks_dict_to_locs"
